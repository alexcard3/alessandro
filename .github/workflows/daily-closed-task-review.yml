name: Daily closed-task review

on:
  schedule:
    # 06:00 UTC every day. Adjust if the project needs a different timezone.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  review-closed-tasks:
    name: Review consolidated tasks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run test suite
        run: python -m unittest discover -s tests

      - name: Generate closed-task review report
        env:
          DAILY_REVIEW_EMAIL_TO: ${{ secrets.DAILY_REVIEW_EMAIL_TO }}
          DAILY_REVIEW_EMAIL_FROM: ${{ secrets.DAILY_REVIEW_EMAIL_FROM }}
          DAILY_REVIEW_SMTP_HOST: ${{ secrets.DAILY_REVIEW_SMTP_HOST }}
          DAILY_REVIEW_SMTP_PORT: ${{ secrets.DAILY_REVIEW_SMTP_PORT }}
          DAILY_REVIEW_SMTP_USER: ${{ secrets.DAILY_REVIEW_SMTP_USER }}
          DAILY_REVIEW_SMTP_PASSWORD: ${{ secrets.DAILY_REVIEW_SMTP_PASSWORD }}
        run: |
          python tools/daily_closed_task_review.py \
            --output reports/daily-closed-task-review.md \
            --email-to "$DAILY_REVIEW_EMAIL_TO" \
            --email-from "$DAILY_REVIEW_EMAIL_FROM" \
            --smtp-host "$DAILY_REVIEW_SMTP_HOST" \
            --smtp-port "${DAILY_REVIEW_SMTP_PORT:-587}" \
            --smtp-user "$DAILY_REVIEW_SMTP_USER" \
            --smtp-password "$DAILY_REVIEW_SMTP_PASSWORD"

      - name: Upload review report
        uses: actions/upload-artifact@v4
        with:
          name: daily-closed-task-review
          path: reports/daily-closed-task-review.md
